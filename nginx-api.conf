server {
    listen 80;
    server_name api.zyncjobs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.zyncjobs.com;

    ssl_certificate     /etc/letsencrypt/live/api.zyncjobs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zyncjobs.com/privkey.pem;

    # Increase body size for file uploads (profile photo, resume)
    client_max_body_size 20m;

    location / {
        # Handle preflight OPTIONS
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Requested-With, Accept, Origin' always;
            add_header 'Access-Control-Max-Age'           86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_read_timeout    120s;
        proxy_connect_timeout 60s;

        # Remove any CORS headers the backend sends to avoid duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # Nginx adds the correct CORS headers on every response
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Requested-With, Accept, Origin' always;
    }
}
