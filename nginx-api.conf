server {
    listen 80;
    server_name api.zyncjobs.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.zyncjobs.com;

    # SSL certs (update paths to your actual cert files)
    ssl_certificate     /etc/letsencrypt/live/api.zyncjobs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zyncjobs.com/privkey.pem;

    # CORS — allow www.zyncjobs.com and zyncjobs.com
    set $cors_origin "";
    if ($http_origin ~* "^https://(www\.)?zyncjobs\.com$") {
        set $cors_origin $http_origin;
    }

    # Handle preflight OPTIONS globally
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Requested-With, Accept' always;
        add_header 'Access-Control-Max-Age'           86400        always;
        add_header 'Content-Length' 0;
        return 204;
    }

    location / {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_read_timeout    60s;
        proxy_connect_timeout 60s;

        # CORS headers on actual responses
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Requested-With, Accept' always;
    }
}
